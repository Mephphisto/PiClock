name: Docker Image CI
on:
  workflow_run:
    workflows: ["Hadolint"]
    types:
      - completed
    branches: [ "main" ]
  push:
    tags: [ "v*.*.*" ]          # stable releases, e.g. v1.2.3

jobs:
  build:
    runs-on: ubuntu-latest
    # run on a tag push, OR when Hadolint passed on main
    if: >-
      ${{ github.event_name == 'push' ||
          github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write          # needed to push to GHCR
    steps:
    - uses: actions/checkout@v4
      with:
        # build the exact commit Hadolint linted; on a tag push this
        # falls back to the tag's own commit
        ref: ${{ github.event.workflow_run.head_sha || github.sha }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Lowercase the image name
      id: image
      run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

    - name: Extract tags / labels
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.image.outputs.name }}
        tags: |
          type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' }}
          type=sha,enable=${{ github.event_name == 'workflow_run' }}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=stable,enable=${{ github.event_name == 'push' }}

    - name: Build and push the Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
